<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Kiber-Laboratoriya</title>
    <style>
        body { 
            background: #0a0a0a; 
            color: #00ff41; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden;
        }
        .box { 
            border: 2px solid #00ff41; 
            padding: 40px; 
            box-shadow: 0 0 20px #00ff41; 
            text-align: center; 
            background: rgba(0, 0, 0, 0.9);
        }
        input { 
            background: #000; 
            color: #00ff41; 
            border: 1px solid #00ff41; 
            padding: 12px; 
            width: 250px; 
            margin: 20px 0; 
            font-size: 18px;
            outline: none;
        }
        button { 
            background: #00ff41; 
            color: #000; 
            border: none; 
            padding: 12px 30px; 
            cursor: pointer; 
            font-weight: bold; 
            text-transform: uppercase;
        }
        button:hover { background: #00cc33; }
        #status { font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login" class="box">
        <h2>🔐 TERMINALGA KIRISH</h2>
        <p>Xavfsizlik parolini kiriting:</p>
        <input type="password" id="pass" autofocus><br>
        <button onclick="check()">Tasdiqlash</button>
        <p id="status"></p>
    </div>

    <div id="content" style="display:none;" class="box">
        <h2>🚀 SALOM, USTOZ!</h2>
        <p>Laboratoriya holati: <span style="color:white">XAVFSIZ</span></p>
        <p>Tizim to'liq himoya ostida.</p>
    </div>

    <script>
        let attempts = 0;
        const secret = "MeningHimoyam777"; 

        function check() {
            let input = document.getElementById("pass").value;
            let status = document.getElementById("status");

            if (input === secret) {
                document.getElementById("content").style.display = "block";
                document.getElementById("login").style.display = "none";
            } else {
                attempts++;
                if (attempts >= 3) {
                    alert("DIQQAT! Hujum aniqlandi. Tizim bloklandi.");
                    document.body.innerHTML = "<h1 style='color:red; text-align:center; width:100%'>🚨 TIZIMDAN CHETLATILDINGIZ! 🚨</h1>";
                } else {
                    status.innerHTML = "Xato! Qolgan urinishlar: " + (3 - attempts);
                    status.style.color = "red";
                }
            }
        }
    </script>
</body>
</html>
